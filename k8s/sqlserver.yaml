apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-sqlserver
  namespace: fcg
  labels:
    app: catalog-sqlserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-sqlserver
  template:
    metadata:
      labels:
        app: catalog-sqlserver
    spec:
      containers:
        - name: catalog-sqlserver
          image: mcr.microsoft.com/mssql/server:2022-latest
          ports:
            - name: sql
              containerPort: 1433
              protocol: TCP
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fcg-catalog-secret
                  key: SqlServer__SaPassword
          volumeMounts:
            - name: catalog-sqlserver-storage
              mountPath: /var/opt/mssql
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
      volumes:
        - name: catalog-sqlserver-storage
          persistentVolumeClaim:
            claimName: catalog-sqlserver-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-sqlserver
  namespace: fcg
spec:
  type: ClusterIP
  selector:
    app: catalog-sqlserver
  ports:
    - name: sql
      protocol: TCP
      port: 1433
      targetPort: 1433
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: catalog-sqlserver-pvc
  namespace: fcg
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
