services:

  catalog-api:
    build:
      context: ..
      dockerfile: FCG.Catalog/Dockerfile.Api

    container_name: fcg-catalog-api

    ports:
      - "5002:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080

      ConnectionStrings__DefaultConnection: "Server=catalog-sqlserver,1433;Database=FCGCatalogDb;User Id=sa;Password=senha123@#4l;TrustServerCertificate=True;Encrypt=False"

      Jwt__SecretKey: "Q8m5L2b0V0xSgFJq9nR4pY7eTcW1uNzKk3XhM8aPvL2YzR5fGb1nC9wE6sDtQ7uH"
      Jwt__Issuer: "FCG.Catalog.Api"
      Jwt__Audience: "FCG.CloudGames"
      Jwt__ExpirationMinutes: "60"

      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__VirtualHost: /
      RabbitMq__Username: rabbitmquser
      RabbitMq__Password: rbmq2587!@

    depends_on:
      - catalog-sqlserver
      - rabbitmq

  catalog-worker:
    build:
      context: ..
      dockerfile: FCG.Catalog/Dockerfile.Worker

    container_name: fcg-catalog-worker

    environment:
      ASPNETCORE_ENVIRONMENT: Development

      ConnectionStrings__DefaultConnection: "Server=catalog-sqlserver,1433;Database=FCGCatalogDb;User Id=sa;Password=senha123@#4l;TrustServerCertificate=True;Encrypt=False"

      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__VirtualHost: /
      RabbitMq__Username: rabbitmquser
      RabbitMq__Password: rbmq2587!@

    depends_on:
      - catalog-sqlserver
      - rabbitmq

  catalog-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fcg-catalog-sqlserver

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "senha123@#4l"

    ports:
      - "1436:1433"

    volumes:
      - catalog_sqlserver_data:/var/opt/mssql

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fcg-rabbitmq

    environment:
      RABBITMQ_DEFAULT_USER: "rabbitmquser"
      RABBITMQ_DEFAULT_PASS: "rbmq2587!@"

    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  catalog_sqlserver_data: